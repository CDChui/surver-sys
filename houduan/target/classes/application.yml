server:
  port: 8080

spring:
  application:
    name: houduan
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/questionnaire?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: change-this-to-at-least-32-characters-secret
    ttl-seconds: 7200
    issuer: survey-system
  admin:
    init:
      username: admin
      password: 123456
  sso:
    mock:
      enabled: true
