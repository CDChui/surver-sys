server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: houduan
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:questionnaire}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: change-this-to-at-least-32-characters-secret
    ttl-seconds: 7200
    issuer: survey-system
  admin:
    init:
      username: admin
      password: 123456
  sso:
    mock:
      enabled: true
